name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and start containers
      run: docker-compose up -d --build

    - name: Wait for services to be ready
      run: |
        docker-compose exec -T laravel.test php artisan migrate --force
        sleep 10

    - name: Run tests
      run: docker-compose exec -T laravel.test php artisan test

    - name: Run tests with coverage
      run: docker-compose exec -T -e XDEBUG_MODE=coverage laravel.test php artisan test --coverage-clover=coverage.xml

    - name: Copy coverage report
      run: docker cp $(docker-compose ps -q laravel.test):/var/www/html/coverage.xml ./coverage.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: backend
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --coverage --coverageReporters=cobertura --coverageReporters=lcov

    - name: Upload frontend coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./frontend/coverage/cobertura-coverage.xml
        flags: frontend
        name: codecov-umbrella
        fail_ci_if_error: false