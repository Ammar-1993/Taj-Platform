name: Deploy Next.js Frontend 🎨

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/taj-frontend
            
            # 1. سحب آخر التحديثات
            git pull origin main
            
            # 2. تثبيت الحزم
            npm install
            
            # 3. بناء النسخة الإنتاجية
            npm run build
            
            # 4. إعادة تشغيل السيرفر باستخدام PM2 (بدون توقف)
            pm2 restart taj-frontend || pm2 start npm --name "taj-frontend" -- start
            
            echo "✅ Frontend Deployed Successfully!"