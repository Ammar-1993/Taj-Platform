name: 🚀 Deploy Backend to DigitalOcean VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yml'

jobs:
  deploy:
    name: Deploy Laravel to VPS
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            echo "📥 [1/6] سحب آخر التحديثات من GitHub..."
            cd /opt/taj-platform
            GIT_SSH_COMMAND="ssh -i /root/.ssh/taj_deploy -o StrictHostKeyChecking=no" \
              git pull origin main

            echo "🔨 [2/6] بناء صورة Docker الجديدة..."
            docker compose -f docker-compose.prod.yml build taj_app_web

            echo "🔧 [3/6] تشغيل التهجيرات بأمان قبل النشر..."
            docker compose -f docker-compose.prod.yml run --rm taj_app_web php artisan migrate --force

            echo "🚀 [4/6] تحديث الحاويات لتشغيل الكود الجديد (Minimal Downtime)..."
            docker compose -f docker-compose.prod.yml up -d --no-deps taj_app_web taj_queue_worker

            echo "⚡ [5/6] تحسين الأداء وتفعيل الكاش..."
            docker exec taj_app_web php artisan optimize

            echo "🧹 [6/6] تنظيف الصور القديمة لتوفير المساحة..."
            docker image prune -f

            echo "✅ تم النشر بنجاح في $(date '+%Y-%m-%d %H:%M:%S')"
            docker compose -f docker-compose.prod.yml ps
