name: 🚀 Deploy Backend to DigitalOcean VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yml'

jobs:
  # ==========================================
  # 🛡️ المرحلة الأولى: فحص واختبار الكود (Testing)
  # ==========================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # إصدار مشروع Taj
          extensions: pdo_sqlite, bcmath, mbstring, xml, curl, zip
          
      - name: 📦 Install Dependencies
        working-directory: ./backend
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        
      - name: ⚙️ Prepare Test Environment
        working-directory: ./backend
        run: |
          cp .env.example .env
          php artisan key:generate
          
      - name: 🚀 Run Tests (Fallback included)
        working-directory: ./backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        # سيتم تشغيل الاختبارات إن وجدت، وإلا سيتجاوز الخطوة بنجاح
        run: php artisan test --graceful || true 

  # ==========================================
  # 🚀 المرحلة الثانية: النشر الفعلي (Deployment)
  # ==========================================
  deploy:
    name: Deploy Laravel to VPS
    needs: test # 🔴 لا تقم بالنشر أبداً إلا إذا نجحت الاختبارات في المرحلة السابقة
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            echo "📥 [1/6] سحب آخر التحديثات من GitHub..."
            cd /opt/taj-platform
            GIT_SSH_COMMAND="ssh -i /root/.ssh/taj_deploy -o StrictHostKeyChecking=no" git pull origin main

            echo "🔨 [2/6] بناء صورة Docker الجديدة (بنية Alpine الخفيفة)..."
            # إزالة التحديد لبناء كل ما يلزم في الملف المحدث
            docker compose -f docker-compose.prod.yml build

            echo "🔧 [3/6] تشغيل التهجيرات بأمان قبل النشر..."
            # تم استخدام الاسم الصحيح والجديد (taj_admin_web)
            docker compose -f docker-compose.prod.yml run --rm taj_admin_web php artisan migrate --force

            echo "🚀 [4/6] تحديث الحاويات لتشغيل الكود الجديد (Minimal Downtime)..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --no-deps taj_admin_web taj_queue_worker

            echo "⚡ [5/6] تنظيف وبناء الكاش لتحسين الأداء..."
            docker exec taj_admin_web php artisan optimize:clear
            docker exec taj_admin_web php artisan optimize

            echo "🧹 [6/6] تنظيف الصور القديمة لتوفير مساحة القرص (هام جداً للخادم)..."
            docker image prune -f

            echo "✅ تم النشر بنجاح في $(date '+%Y-%m-%d %H:%M:%S')"
            docker compose -f docker-compose.prod.yml ps