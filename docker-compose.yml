
services:
  # 1. Laravel Backend Service (PHP 8.3)
  laravel.test:
    build:
      context: ./backend
      dockerfile: docker/8.3/Dockerfile
      args:
        WWWUSER: '${WWWUSER:-1000}'
    image: taj-laravel-8.3
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${APP_PORT:-8000}:80'
    environment:
      WWWUSER: '${WWWUSER:-1000}'
      LARAVEL_SAIL: 1
    volumes:
      - './backend:/var/www/html'
    networks:
      - taj-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 2. MySQL Database Service (Isolated Port)
  mysql:
    image: 'mysql:8.0'
    ports:
      # تم تغيير المنفذ الخارجي إلى 3307 لتفادي التعارض في جهازك
      - '${FORWARD_DB_PORT:-3307}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE:-taj_database}'
      MYSQL_USER: '${DB_USERNAME:-taj_user}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'taj-mysql:/var/lib/mysql'
    networks:
      - taj-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-secret}"]
      retries: 3
      timeout: 5s

  # ─── خدمة Redis للمعالجة الخلفية ───────────────────────────
  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6390}:6379'      # منفذ مختلف لتفادي التعارض
    volumes:
      - 'taj-redis:/data'
    networks:
      - taj-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  # 3. Next.js Frontend Service
  nextjs:
    image: 'node:20'
    working_dir: /app
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    volumes:
      - './frontend:/app'
      # عزل مجلدات البناء والحزم داخل الحاوية كـ volumes مسمّاة لتجنّب تعارض الصلاحيات
      - nextjs_build:/app/.next
      - nextjs_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    tty: true
    stdin_open: true
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    networks:
      - taj-network
    depends_on:
      laravel.test:
        condition: service_started

networks:
  taj-network:
    driver: bridge

volumes:
  taj-mysql:
    driver: local
  taj-redis:
    driver: local
  nextjs_node_modules:
    driver: local
  nextjs_build:
    driver: local